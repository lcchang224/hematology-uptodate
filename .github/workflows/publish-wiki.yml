name: Publish Reports to Wiki

on:
  push:
    branches: [main]
    paths:
      - "reports/**.md"

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed report files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files=$(find reports -name "*.md" | sort)
          else
            files=$(git diff --name-only HEAD~1 HEAD -- "reports/*.md" | sort)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed: $files"

      - name: Setup wiki directory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "Cloned existing wiki."
          else
            echo ""
            echo "============================================================"
            echo "  Wiki not initialized yet."
            echo "  One-time setup required:"
            echo "  1. Go to: https://github.com/${{ github.repository }}/wiki"
            echo "  2. Click 'Create the first page', save anything."
            echo "  3. Re-run this workflow — it will work automatically."
            echo "============================================================"
            exit 1
          fi

          git -C wiki config user.name  "github-actions[bot]"
          git -C wiki config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy reports and rebuild index
        run: |
          changed_files="${{ steps.changed.outputs.files }}"
          if [ -z "$changed_files" ]; then
            echo "No changed files — skipping."
            exit 0
          fi

          for f in $changed_files; do
            [ -f "$f" ] || continue
            cp "$f" "wiki/$(basename "$f")"
            echo "Copied $f"
          done

          # Rebuild Home.md index (newest first, grouped by mode)
          {
            echo "# Hematology Weekly Reports"
            echo ""
            echo "> Auto-generated weekly · Sources: CrossRef, ASH, EHA, ISTH, OncLive"
            echo ""
            echo "## Hematological Malignancies"
            echo ""
            echo "| Week | Link |"
            echo "|------|------|"
            for md in $(ls wiki/malignant-[0-9][0-9][0-9][0-9]-W[0-9][0-9].md 2>/dev/null | sort -r); do
              week="$(basename "${md%.md}")"
              echo "| ${week#malignant-} | [[$week]] |"
            done
            echo ""
            echo "## Non-malignant Hematology"
            echo ""
            echo "| Week | Link |"
            echo "|------|------|"
            for md in $(ls wiki/benign-[0-9][0-9][0-9][0-9]-W[0-9][0-9].md 2>/dev/null | sort -r); do
              week="$(basename "${md%.md}")"
              echo "| ${week#benign-} | [[$week]] |"
            done
          } > wiki/Home.md

      - name: Commit and push wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git -C wiki add -A
          if git -C wiki diff --cached --quiet; then
            echo "Wiki already up-to-date."
          else
            git -C wiki commit -m "wiki: $(date -u +%Y-%m-%d) — publish reports [skip ci]"
            git -C wiki push "$WIKI_URL" HEAD:master --force
          fi

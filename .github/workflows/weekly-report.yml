name: Weekly Hematology Report

on:
  schedule:
    - cron: '0 0 * * 5'   # Friday 00:00 UTC = Friday 08:00 Taipei (UTC+8)
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

permissions:
  contents: write           # needed to commit reports/ back to the repo

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Collect data — malignant mode
        env:
          PYTHONUTF8: "1"
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: |
          uv run python main.py scrape   -m malignant
          uv run python main.py journals -m malignant

      - name: Collect data — benign mode
        env:
          PYTHONUTF8: "1"
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: |
          uv run python main.py scrape   -m benign
          uv run python main.py journals -m benign

      - name: Generate reports
        env:
          PYTHONUTF8: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python scripts/generate_report.py

      - name: Build manifest
        run: uv run python scripts/build_manifest.py

      - name: Commit reports + manifest to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ manifests/
          git diff --staged --quiet || git commit -m "report: weekly $(python -c 'from datetime import date; d=date.today(); print(f\"{d.year}-W{d.isocalendar()[1]:02d}\")')"
          git push

      - name: Notify lcchema-hub
        env:
          HUB_TOKEN: ${{ secrets.HUB_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $HUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository_owner }}/lcchema-hub/dispatches" \
            -d '{"event_type":"report-published"}'
